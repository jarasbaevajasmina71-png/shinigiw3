<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UI</title>
  <link rel="stylesheet" href="shinigiw2.css">
</head>
<body>

<div class="container">

  <!-- RADIO (jasırın) -->
  <input type="radio" name="btn" id="btn1">
  <input type="radio" name="btn" id="btn2">
  <input type="radio" name="btn" id="btn3">
  <input type="radio" name="btn" id="btn4">
  <input type="radio" name="btn" id="btn5">
  <input type="radio" name="btn" id="btn6">

  <!-- Сол жақ -->
  <div class="left">
    <label for="btn1">1</label>
    <label for="btn2">2</label>
    <label for="btn3">3</label>
  </div>

  <!-- Орта -->
  <div class="center">
    <div class="off">OFF</div>

    <input type="text" class="input" placeholder="Write...">
    <div class="loading"></div>
    <div class="hello">Hello</div>
    <div class="smile">😊</div>
  </div>

  <!-- Оң жақ -->
  <div class="right">
    <label for="btn4">4</label>
    <label for="btn5">5</label>
    <label for="btn6">6</label>
  </div>

</div>

</body>
</html>
